{% extends "base.html" %}

{% block content %}
<div class="grid-2">
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-code"></i> Configuration Generator</h2>
        </div>
        <div class="card-body">
            <div class="form-group">
                <label>Device Hostname</label>
                <input type="text" id="hostname" class="form-control" placeholder="e.g., CoreRouter-01" value="CoreRouter-01">
            </div>
            <div class="form-group">
                <label>Management IP Address</label>
                <input type="text" id="mgmt_ip" class="form-control" placeholder="e.g., 192.168.1.1" value="192.168.1.1">
            </div>
            <div class="form-group">
                <label>Subnet Mask</label>
                <input type="text" id="mgmt_mask" class="form-control" placeholder="255.255.255.0" value="255.255.255.0">
            </div>
            <div class="form-group">
                <label>Enable Password</label>
                <input type="password" id="enable_pass" class="form-control" placeholder="Enable password" value="AutoNet@2024">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" class="form-control" placeholder="Username" value="admin">
            </div>
            <div class="form-group">
                <label>User Password</label>
                <input type="password" id="user_pass" class="form-control" placeholder="User password" value="Admin@123">
            </div>
            <div class="form-group">
                <label>SNMP Community</label>
                <input type="text" id="snmp" class="form-control" placeholder="SNMP community" value="AutoNetRO">
            </div>
            <div class="form-group">
                <label>NTP Server</label>
                <input type="text" id="ntp" class="form-control" placeholder="NTP server" value="10.0.0.100">
            </div>
            <div class="form-group">
                <label>Syslog Server</label>
                <input type="text" id="syslog" class="form-control" placeholder="Syslog server" value="10.0.0.200">
            </div>
            <button class="btn" onclick="generateConfig()">
                <i class="fas fa-magic"></i> Generate Configuration
            </button>
        </div>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-file-alt"></i> Generated Configuration</h2>
            <button class="btn btn-small" onclick="copyConfig()">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>
        <div class="card-body">
            <div id="generatedConfig" class="terminal">
                <pre>! Press "Generate Configuration" to create Cisco config</pre>
            </div>
            <div style="margin-top: 12px; font-size: 12px; color: #718096;">
                Lines: <span id="configLines">0</span> | Size: <span id="configSize">0 KB</span>
            </div>
        </div>
    </div>
</div>

<script>
async function generateConfig() {
    const data = {
        hostname: document.getElementById('hostname').value,
        mgmt_ip: document.getElementById('mgmt_ip').value,
        mgmt_mask: document.getElementById('mgmt_mask').value,
        enable_pass: document.getElementById('enable_pass').value,
        username: document.getElementById('username').value,
        user_pass: document.getElementById('user_pass').value,
        snmp_community: document.getElementById('snmp').value,
        ntp_server: document.getElementById('ntp').value,
        syslog_server: document.getElementById('syslog').value
    };
    
    const response = await fetch('/api/config/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    
    const result = await response.json();
    
    if (result.success) {
        document.getElementById('generatedConfig').innerHTML = `<pre>${result.config}</pre>`;
        document.getElementById('configLines').innerText = result.lines;
        document.getElementById('configSize').innerText = result.size + ' KB';
        showToast('Configuration generated successfully!', 'success');
    }
}

function copyConfig() {
    const config = document.getElementById('generatedConfig').innerText;
    navigator.clipboard.writeText(config);
    showToast('Configuration copied to clipboard!', 'success');
}
</script>
{% endblock %}
